name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Convert MP3 to OGG
        run: |
          sudo apt-get install -y ffmpeg
          find src/app/assets -name "*.mp3" -exec sh -c \
            'ffmpeg -y -i "$1" -q:a 4 "${1%.mp3}.ogg"' _ {} \;

      - name: Build
        working-directory: src
        run: pygbag --build --title "Dikta" --icon app/assets/ui/icon.png .

      - uses: actions/upload-pages-artifact@v3
        with:
          path: src/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
